[workspace]
name = "bio-reproducer"
description = "生物信息学论文复现工作流"
channels = ["conda-forge", "bioconda"]
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[activation.env]
SKILLS_HOME = "${PIXI_PROJECT_ROOT}/.skills"
SKIT_BINDIR = "${PIXI_PROJECT_ROOT}/.local/bin"
MIP_BINDIR = "${PIXI_PROJECT_ROOT}/.local/bin"
MINERU_API_URL = "http://172.16.218.40:8000"  # 填写 MinerU API 服务器地址
PATH = "${PIXI_PROJECT_ROOT}/.local/bin:${PATH}"

[dependencies]
openjdk = ">=11"
nextflow = ">=24.0"
python = ">=3.10"

[tasks]
install-skit = { cmd = "SKIT_BINDIR=.local/bin curl -fsSL https://raw.githubusercontent.com/vlln/skit/main/install.sh | sh" }
install-mip = { cmd = "MIP_BINDIR=.local/bin curl -fsSL https://raw.githubusercontent.com/vlln/mip/main/scripts/install.sh | sh" }

# Skills
install-skill-paperutils = { cmd = "skit install --dir .skills https://github.com/vlln/paperutils/skills/paperutils"}
install-skill-mineru-api = { cmd = "skit install --dir .skills https://github.com/vlln/mineru-api-skill/skills/mineru-api" }
install-skill-background-task = { cmd = "skit install --dir .skills https://github.com/vlln/background-task-skill/skills/background-task" }
install-skill-image-mirror = { cmd = "skit install --dir .skills https://github.com/vlln/mip/skills/image-mirror-skill" }
install-skill-github-mirror = { cmd = "skit install --dir .skills https://github.com/vlln/mip/skills/github-mirror-skill" }
install-skill-bioskills = { cmd = "skit install --dir .skills https://github.com/vlln/bio-skills --all" }

install-skills = { cmd = "echo 'All skills installed'", depends-on = [
    "install-skill-paperutils",
    "install-skill-mineru-api",
    "install-skill-background-task",
    "install-skill-image-mirror",
    "install-skill-github-mirror",
    "install-skill-bioskills",
] }

check-env = { cmd = "echo 'Java:' && java -version && echo 'Nextflow:' && nextflow -version && echo 'mip:' && mip version && echo 'gip:' && gip version && echo 'paperutils:' && paperutils --help" }
