id: bench-006
version: "1.0.0"
expected_verdict: REPRODUCED
min_score: 70
runs_required: 5
verdict_match_threshold: 0.6

checks:
  data_integrity:
    - check_id: D1
      description: "System detects empty data directory"
      type: auto
      expected:
        data_issue_detected: true
        issue_type: "empty_directory"
    - check_id: D2
      description: "System detects format mismatch (TSV vs declared CSV)"
      type: auto
      expected:
        format_mismatch_detected: true
    - check_id: D3
      description: "System detects truncated file or missing rows"
      type: auto
      expected:
        truncation_detected: true
    - check_id: D4
      description: "System detects DataIntegrityR tool not available"
      type: auto
      expected:
        tool_not_found_detected: true
    - check_id: D5
      description: "System recovers and loads data (15 genes, 8 samples)"
      type: auto
      expected:
        n_genes: 15
        n_samples: 8

  process_quality:
    - check_id: Q1
      description: "DESeq2 analysis completed despite data issues"
      type: auto
      expected:
        status: success
    - check_id: Q2
      description: "R version is 4.3.x or compatible"
      type: auto
      expected:
        r_version_pattern: "4\\.3"

  quantitative_concordance:
    - check_id: R1
      description: "IL6 is significantly upregulated"
      type: auto
      expected:
        gene: IL6
        direction: up
        log2fc_min: 1.0
        padj_max: 0.05
    - check_id: R2
      description: "TNF is significantly upregulated"
      type: auto
      expected:
        gene: TNF
        direction: up
        log2fc_min: 1.0
        padj_max: 0.05
    - check_id: R3
      description: "BCL2 is significantly downregulated"
      type: auto
      expected:
        gene: BCL2
        direction: down
        log2fc_max: -1.0
        padj_max: 0.05
    - check_id: R4
      description: "MCL1 is significantly downregulated"
      type: auto
      expected:
        gene: MCL1
        direction: down
        log2fc_max: -1.0
        padj_max: 0.05
    - check_id: R5
      description: "At least 4 significant genes found"
      type: auto
      expected:
        min_sig_genes: 4

  figure_and_finding:
    - check_id: F1
      description: "Volcano plot generated"
      type: auto
      expected:
        figure_exists: true
        figure_type: volcano
    - check_id: F2
      description: "Volcano plot shows highlighted significant genes"
      type: visual
      expected:
        highlighted_genes: ["IL6", "TNF", "BCL2", "MCL1"]