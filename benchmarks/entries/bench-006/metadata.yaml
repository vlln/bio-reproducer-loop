id: bench-006
version: "2.0.0"
protocol_version: "2.0"
oracle_version: "1.0.0"
title: "Data Recovery and Quality Assessment Pipeline for Gene Expression Signatures"
scenario: data_degradation
difficulty: medium
input_dir: input/
oracle_dir: oracle/
description: >
  Constructed paper with extreme data degradation. 15 genes × 8 samples.
  The supplied counts.csv exists but contains only 11 of the 15 claimed
  genes, uses TSV delimiters despite its CSV extension, and is truncated.
  The paper references a non-existent tool (DataIntegrityR) and a dead GEO
  accession. Tests system ability to detect and report data limitations.


# ───────────────────────────────────────────
# 复杂度画像
# ───────────────────────────────────────────

complexity_profile:
  data:
    data_size: tiny
    data_source: synthetic
    data_format: tsv
    supplementary: simple
  environment:
    tool_count: 1-2
    tool_chain: single_language
    version_sensitivity: moderate
    container: existing_image
  analysis:
    design: two_group
    method_complexity: standard
    compute: light
  figure:
    figure_count: 1
    figure_type: statistical
    figure_layout: simple
    figure_rendering: standard
  evaluation:
    ground_truth: fully_known
    claim_type: directional
    tolerance: strict
  paper:
    paper_type: constructed
    paper_format: markdown
    multi_version: none
    missing_info: version_gaps

# ───────────────────────────────────────────
# 鲁棒性画像
# ───────────────────────────────────────────

robustness_profile:
  resource_unavailability:
    database_down: false
    registry_down: false
    tool_not_found: true
    repo_gone: true
    doi_dead: true
    image_missing: true
  data_degradation:
    empty_data_dir: false
    truncated_file: true
    format_mismatch: true
    wrong_accession: true
  information_degradation:
    missing_supplementary: true
    version_gaps: true
    implicit_steps: false
    scattered_params: false
    conflicting_info: false
  environment_drift:
    version_mismatch: false
    os_mismatch: false
    arch_mismatch: false
    missing_system_dep: false

# ───────────────────────────────────────────
# 系统能力覆盖
# ───────────────────────────────────────────

capability_coverage:
  covers:
    - incomplete_local_data: "counts.csv 存在，但只有 11 个数据行，少于论文声称的 15 个基因"
    - truncated_file: "counts.csv 被截断，缺少 4 个基因数据行"
    - format_mismatch: "论文说 CSV 但实际文件是 TSV（制表符分隔）"
    - tool_not_found: "DataIntegrityR 包不存在，系统需回退"
    - wrong_accession: "GSE 指向其他研究"
  does_not_cover:
    - multi_language: "纯 R 流程"
    - large_data: "15 基因 × 8 样本"

design_decisions:
  - decision: "提供不完整的本地 counts.csv"
    intent: "测试系统能否识别论文声称的 15 个基因与实际 11 行数据之间的差异"
  - decision: "counts.csv 实际是 TSV 格式且被截断"
    intent: "测试系统能否检测格式不匹配并处理不完整数据"
  - decision: "DataIntegrityR 工具不存在"
    intent: "测试系统能否检测工具不可用并回退到替代方案"
  - decision: "GEO accession 指向无关研究，GitHub 仓库不可用"
    intent: "测试系统能否识别错误数据来源并使用受损的本地输入降级分析"

reproducibility:
  known_limitations:
    - "本地 counts.csv 只有 11 个基因，无法恢复论文声称但未提供的 4 个基因数据"
    - "DataIntegrityR 包不存在，系统需要回退到 base R 函数"
    - "GEO 不可访问意味着无法从外部获取数据"
  expected_runtime: "~5 min"
  data_size: "< 1 KB"
  tool_requirements:
    - "R ≥ 4.3.0"
    - "DESeq2 ≥ 1.42.0"
  container_image: "bioconductor/bioconductor_docker:latest"
