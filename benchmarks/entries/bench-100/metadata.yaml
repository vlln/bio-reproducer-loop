id: bench-100
version: "2.0.0"
protocol_version: "2.0"
oracle_version: "2.0.0"
title: "RNA-Seq Transcriptome Profiling Identifies CRISPLD2 as a Glucocorticoid Responsive Gene"
scenario: data
difficulty: hard
input_dir: input/
oracle_dir: oracle/
description: >
  Real published PLOS ONE materials for Himes et al. 2014. The scored scope is
  the RNA-seq computational result: verify the released Cuffdiff and FPKM
  outputs for dexamethasone-treated versus untreated airway smooth muscle cells.
  Wet-lab validation and GWAS analyses remain paper context but are not scored.

complexity_profile:
  data:
    data_size: small
    data_source: public_db
    data_format: mixed
    supplementary: complex
  environment:
    tool_count: 6+
    tool_chain: multi_language
    version_sensitivity: critical
    container: custom_dockerfile
  analysis:
    design: paired
    method_complexity: multi_step
    compute: light
  figure:
    figure_count: 1
    figure_type: statistical
    figure_layout: moderate
    figure_rendering: standard
  evaluation:
    ground_truth: fully_known
    claim_type: mixed
    tolerance: strict
  paper:
    paper_type: real_published
    paper_format: pdf
    multi_version: versioned_dataset
    missing_info: version_gaps

robustness_profile:
  resource_unavailability:
    database_down: false
    registry_down: false
    tool_not_found: false
    repo_gone: false
    doi_dead: false
    image_missing: false
  data_degradation:
    empty_data_dir: false
    truncated_file: false
    format_mismatch: false
    wrong_accession: false
  information_degradation:
    missing_supplementary: false
    version_gaps: true
    implicit_steps: false
    scattered_params: true
    conflicting_info: false
  environment_drift:
    version_mismatch: true
    os_mismatch: false
    arch_mismatch: false
    missing_system_dep: false

capability_coverage:
  covers:
    - original_paper_reading: "Read the publisher PDF/XML rather than a benchmark-authored summary"
    - supplementary_discovery: "Inspect the complete PMC supplementary archive"
    - published_output_validation: "Verify released Cuffdiff and FPKM outputs against paper claims"
    - provenance_reasoning: "Relate GEO, ENA raw-read resolver, and the Taffeta code snapshot"
    - historical_workflow: "Identify FastQC, FASTX, TopHat, Cufflinks, Cuffdiff, CummeRbund, and DAVID"
  does_not_cover:
    - raw_alignment_default: "The 46.9 GiB FASTQ set is resolvable but not staged as the default scored path"
    - historical_environment_execution: "Historical tool identities are preserved, but executable packages and containers are not frozen in this processed-output scope"
    - prior_microarray_reanalysis: "GSE34313 and GSE13168 support paper context but are not scored"
    - wet_lab_reproduction: "qRT-PCR, Western blot, cytokine, and knockdown experiments are not scored"
    - gwas_reproduction: "Restricted participant-level GWAS analyses are not scored"

design_decisions:
  - decision: "Score verification from official GEO processed outputs"
    intent: "Keep the L4 default run bounded while preserving raw FASTQ URLs, MD5 values, and sizes"
  - decision: "Use the original Cuffdiff orientation and report DEX-versus-control explicitly"
    intent: "Avoid treating the Cuffdiff sample_1/sample_2 sign convention as a biological reversal"
  - decision: "Exclude airway/DESeq2 from the paper reproduction contract"
    intent: "The Bioconductor teaching dataset is a later reanalysis, not the method reported by Himes et al."

reproducibility:
  known_limitations:
    - "The exact historical hg19 iGenomes snapshot is not identified by immutable checksum"
    - "The historical DAVID database release is not specified"
    - "Participant-level GWAS data are not distributed with the article"
  expected_runtime: "<10 min for the scored processed-output verification"
  staged_input_size: "~7.1 MiB"
  optional_raw_input_size: "46.9 GiB across 16 ENA runs"
  source_code_commit: d12f00f74de35e437068349c617869a97856e160
