id: bench-100
paper_title: "RNA-Seq Transcriptome Profiling Identifies CRISPLD2 as a Glucocorticoid Responsive Gene that Modulates Cytokine Function in Airway Smooth Muscle Cells"
paper_doi: "10.1371/journal.pone.0099625"

experimental_design:
  - claim_id: ED-1
    description: "Four primary human airway smooth muscle donor lines were measured untreated and after dexamethasone exposure"
    source: "Article Methods: ASM Cell Culture; GEO GSE52778"
    details: {n_donors: 4, n_scored_samples: 8, treatment: "1 micromolar dexamethasone for 18 hours", paired: true}

methods:
  - claim_id: M-1
    description: "The reported RNA-seq workflow used Taffeta, FastQC, FASTX trimming, TopHat 2.0.4, Cufflinks/Cuffdiff 2.0.2, and CummeRbund 0.1.3"
    source: "Article Methods: RNA-Seq Data Analysis"
    details: {reference: hg19, correction: Benjamini-Hochberg, q_value_threshold: 0.05}
  - claim_id: M-2
    description: "DAVID functional annotation used Homo sapiens background and the article-listed default categories"
    source: "Article Methods: RNA-Seq Data Analysis; Table S4"

quantitative_results:
  - claim_id: R-1
    description: "Cuffdiff identified 316 genes with Benjamini-Hochberg q-value below 0.05"
    source: "Abstract; Results; Figure 1; Table S3; GSE52778 Cuffdiff output"
    details: {n_significant: 316, q_value_threshold: 0.05}
  - claim_id: R-2
    description: "DUSP1, KLF15, PER1, TSC22D3, C7, CCDC69, and CRISPLD2 were induced by dexamethasone"
    source: "Abstract; Table 1; GSE52778 Cuffdiff output"
    details: {genes: [DUSP1, KLF15, PER1, TSC22D3, C7, CCDC69, CRISPLD2], direction: upregulated}
  - claim_id: R-3
    description: "CRISPLD2 mean FPKM was 7.89 untreated and 51.17 after dexamethasone, with q-value 6.9242e-13"
    source: "Table 1; GSE52778 Cuffdiff output"
    details: {gene: CRISPLD2, control_fpkm: 7.89376, dex_fpkm: 51.1687, log2_fold_change_dex_vs_control: 2.69648, q_value: 6.9242e-13}

figures:
  - claim_id: F-1
    description: "Figure 1A is a volcano plot of gene-level dexamethasone differential expression with 316 significant genes"
    source: "Figure 1 caption"

conclusions:
  - claim_id: C-1
    description: "CRISPLD2 is glucocorticoid responsive in airway smooth muscle and is a candidate regulator of inflammatory cytokine function"
    source: "Abstract; Discussion"

data_availability:
  - claim_id: DA-1
    description: "RNA-seq data and processed outputs are available under GEO GSE52778 and SRA/ENA study SRP033351"
    source: "Article Methods; GEO GSE52778"
    details: {geo_accession: GSE52778, raw_study: SRP033351, n_geo_samples: 16, n_scored_samples: 8}
  - claim_id: DA-2
    description: "The analysis scripts are available from the Taffeta repository"
    source: "Article Methods"
    details: {repository: "https://github.com/blancahimes/taffeta", frozen_commit: d12f00f74de35e437068349c617869a97856e160}

input_conditions:
  - claim_id: IC-1
    description: "The scored benchmark scope starts from official GEO Cuffdiff and FPKM outputs; raw FASTQ retrieval is optional"
    source: "Benchmark scope review"
    details: {raw_fastq_bytes: 50359986052, raw_runs: 16, wet_lab_scored: false, gwas_scored: false}
