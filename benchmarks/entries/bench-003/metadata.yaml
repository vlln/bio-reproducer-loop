id: bench-003
version: "2.0.0"
protocol_version: "2.0"
oracle_version: "1.0.0"
title: "RNA-Seq Transcriptome Profiling Identifies CRISPLD2 as a Glucocorticoid Responsive Gene"
scenario: data
difficulty: easy
input_dir: input/
oracle_dir: oracle/
description: >
  Real published paper (Himes et al. 2014, PLOS ONE). Differential expression
  analysis of dexamethasone-treated vs untreated airway smooth muscle cells.
  4 paired cell lines, 8 samples. Uses DESeq2 with paired design
  (~ cell + dex). Data from Bioconductor airway package (GSE52778).
  Known answer: 7 dexamethasone-responsive genes verifiable from paper.
  This is the DESeq2 vignette example — the most classic bioinformatics
  tutorial case.


# ───────────────────────────────────────────
# 复杂度画像
# ───────────────────────────────────────────

complexity_profile:
  data:
    data_size: small
    data_source: public_db
    data_format: rds
    supplementary: none
  environment:
    tool_count: 1-2
    tool_chain: single_language
    version_sensitivity: moderate
    container: existing_image
  analysis:
    design: paired
    method_complexity: standard
    compute: light
  figure:
    figure_count: 1
    figure_type: statistical
    figure_layout: simple
    figure_rendering: standard
  evaluation:
    ground_truth: fully_known
    claim_type: directional
    tolerance: moderate
  paper:
    paper_type: real_published
    paper_format: pdf
    multi_version: none
    missing_info: version_gaps

# ───────────────────────────────────────────
# 鲁棒性画像（注入故障）
# ───────────────────────────────────────────

robustness_profile:
  resource_unavailability:
    database_down: false
    registry_down: false
    tool_not_found: false
    repo_gone: false
    doi_dead: false
    image_missing: false
  data_degradation:
    empty_data_dir: false
    truncated_file: false
    format_mismatch: false
    wrong_accession: false
  information_degradation:
    missing_supplementary: false
    version_gaps: true
    implicit_steps: false
    scattered_params: false
    conflicting_info: false
  environment_drift:
    version_mismatch: true
    os_mismatch: false
    arch_mismatch: false
    missing_system_dep: false

# ───────────────────────────────────────────
# 系统能力覆盖
# ───────────────────────────────────────────

capability_coverage:
  covers:
    - paper_reading: "从真实论文中提取实验设计、分析方法、参数、数据来源"
    - tool_provisioning: "部署 R + DESeq2 环境"
    - bioconductor_data_loading: "从 Bioconductor airway 包加载 RangedSummarizedExperiment 数据"
    - paired_design: "配对设计 ~ cell + dex，处理 blocking factor"
    - statistical_analysis: "DESeq2 差异表达分析（Wald test）"
    - result_validation: "对比 7 个已知 glucocorticoid 响应基因的复现结果"
  does_not_cover:
    - raw_data_download: "数据通过 Bioconductor 包获取，无需 SRA 下载"
    - multi_tool_pipeline: "仅使用 DESeq2，无多步骤流程"
    - large_data_handling: "~64k 转录本 × 8 样本，~10 MB"
    - figure_generation: "无特定图表复现要求"
    - custom_dockerfile: "使用现有 Bioconductor 镜像"

# ───────────────────────────────────────────
# 构造决策记录
# ───────────────────────────────────────────

design_decisions:
  - decision: "使用真实论文而非构造论文"
    intent: "这是第一个 L4 级别（工程基准）的 entry，测试系统对真实论文的处理能力"

  - decision: "只验证 7 个命名基因，不验证全部 316 DEGs"
    intent: "论文明确列出了 7 个关键基因，这些是复现核心。316 DEGs 因 DESeq2 版本差异会波动"

  - decision: "数据通过 Bioconductor airway 包获取，不要求 GEO 下载"
    intent: "airway 包是标准 R 包，`BiocManager::install('airway')` 即可。测试系统能否识别 Bioconductor 数据源"

  - decision: "paired design (~ cell + dex) 而非简单两组比较"
    intent: "测试系统能否正确理解配对设计并从 paper 中提取 blocking factor"

  - decision: "version_gaps=true（不含版本号）"
    intent: "论文发表于 2014 年，未指定精确版本号，测试系统能否推断合理版本"

  - decision: "无 figure 复现要求"
    intent: "论文核心产出是基因列表，非图表。测试系统能否正确判断复现目标"

# ───────────────────────────────────────────
# 可复现性声明
# ───────────────────────────────────────────

reproducibility:
  known_limitations:
    - "316 DEGs 总数因 DESeq2 版本差异会波动（±20%），不作为严格检查项"
    - "padj 值因 DESeq2 版本差异会有数量级变化，只用方向+显著性判断"
    - "论文不提供精确版本号（2014 年发表），R/DESeq2 版本需推断"
  expected_runtime: "~5 min（含 Docker 镜像拉取和 BiocManager 包安装）"
  data_size: "~10 MB"
  output_size: "~100 KB（DE 结果表）"
  tool_requirements:
    - "R ≥ 4.3.0"
    - "DESeq2 ≥ 1.42.0"
    - "airway (Bioconductor data package)"
  container_image: "bioconductor/bioconductor_docker:latest"
