id: bench-003
benchmark_version: "2.0.0"
oracle_version: "2.0.0"
expected_verdict: REPRODUCED
verdict_match_threshold: 0.6
verdict_thresholds: {reproduced: 80, partial: 50}

checks:
  - id: D1
    description: Differential expression evidence is non-empty
    evidence: {artifact_role: result_table}
    comparison: {comparator: file_nonempty}
    weight: 10
  - id: R1
    description: Seven abstract-listed glucocorticoid-responsive genes are DEX-induced and significant
    evidence: {artifact_role: result_table}
    comparison:
      comparator: csv_rows
      key_columns: [gene, Gene, symbol, SYMBOL, gene_id, test_id]
      rows:
        - key_equals: DUSP1
          assertions: &induced
            - {columns: &lfc [log2_fold_change_dex_vs_control, log2FoldChange, log2FC, logFC], operator: greater_than, value: 0}
            - {columns: &qvalue [q_value, qvalue, padj, FDR, adj.P.Val], operator: less_than, value: 0.05}
        - {key_equals: KLF15, assertions: *induced}
        - {key_equals: PER1, assertions: *induced}
        - {key_equals: TSC22D3, assertions: *induced}
        - {key_equals: C7, assertions: *induced}
        - {key_equals: CCDC69, assertions: *induced}
        - {key_equals: CRISPLD2, assertions: *induced}
    weight: 50
  - id: R2
    description: At least 300 genes pass the reported q-value threshold
    evidence: {artifact_role: result_table}
    comparison:
      comparator: csv_count
      where:
        - {columns: *qvalue, operator: less_than, value: 0.05}
      assertion: {operator: greater_than_or_equal, value: 300}
    weight: 20
  - id: R3
    description: CRISPLD2 has the reported strong DEX induction
    evidence: {artifact_role: result_table}
    comparison:
      comparator: csv_row
      key_columns: [gene, Gene, symbol, SYMBOL, gene_id, test_id]
      key_equals: CRISPLD2
      assertions:
        - {columns: *lfc, operator: greater_than, value: 2.5}
        - {columns: *qvalue, operator: less_than, value: 1.0e-10}
    weight: 10
  - id: Q1
    description: Environment record identifies the historical Cuffdiff workflow rather than DESeq2
    evidence: {artifact_role: environment}
    comparison: {comparator: text_regex, pattern: "(?is)(?=.*Cuffdiff)(?=.*(?:Cufflinks|Taffeta))"}
    weight: 10
