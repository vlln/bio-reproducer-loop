id: bench-003
benchmark_version: "2.0.0"
oracle_version: "1.0.0"
expected_verdict: REPRODUCED
verdict_match_threshold: 0.6
verdict_thresholds: {reproduced: 80, partial: 50}

checks:
  - id: D1
    description: Differential expression table is non-empty
    evidence: {artifact_role: result_table}
    comparison: {comparator: file_nonempty}
    weight: 10
  - id: R1
    description: Seven reported dexamethasone-response genes have expected direction and significance
    evidence: {artifact_role: result_table}
    comparison:
      comparator: csv_rows
      key_columns: [gene, Gene, symbol, SYMBOL, ""]
      rows:
        - key_equals: DUSP1
          assertions: &up
            - {columns: &lfc [log2FoldChange, log2FC, logFC], operator: greater_than, value: 0}
            - {columns: &padj [padj, FDR, adj.P.Val], operator: less_than, value: 0.05}
        - {key_equals: KLF15, assertions: *up}
        - {key_equals: PER1, assertions: *up}
        - {key_equals: TSC22D3, assertions: *up}
        - {key_equals: CRISPLD2, assertions: *up}
        - {key_equals: CCDC69, assertions: *up}
        - key_equals: C7
          assertions:
            - {columns: *lfc, operator: less_than, value: 0}
            - {columns: *padj, operator: less_than, value: 0.05}
    weight: 70
  - id: R2
    description: At least 200 genes are significant
    evidence: {artifact_role: result_table}
    comparison:
      comparator: csv_count
      where:
        - {columns: *padj, operator: less_than, value: 0.05}
      assertion: {operator: greater_than_or_equal, value: 200}
    weight: 10
  - id: Q1
    description: Environment record contains DESeq2
    evidence: {artifact_role: environment}
    comparison: {comparator: text_regex, pattern: "(?i)DESeq2[_ ]"}
    weight: 10
