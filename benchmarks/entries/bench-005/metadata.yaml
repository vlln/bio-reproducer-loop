id: bench-005
version: "1.0.0"
title: "Integrative Analysis of Pharmacogenomic Response in Cancer Cell Lines"
scenario: environment_drift
difficulty: medium
expected_verdict: REPRODUCED
paper_pdf: paper.pdf
data_dir: null
expected_yaml: expected.yaml
description: >
  Constructed paper with injected environment drift and conflicting
  information. 30 cancer genes × 12 samples (3 drug treatments). Paper
  declares R 4.1.0 / DESeq2 1.34.0 on Linux x86_64, but system may be
  different. Methods says ~condition but code fragment shows ~treatment.
  Tests system ability to detect and resolve conflicting information.

# ───────────────────────────────────────────
# 评估设计
# ───────────────────────────────────────────

evaluation_design:
  dimensions:
    data_integrity:
      weight: 20
      what_it_tests: "系统能否正确加载 30 基因 × 12 样本数据"
      tolerance: "精确匹配"
    process_quality:
      weight: 25
      what_it_tests: "系统能否在环境漂移和冲突信息下正确配置分析流程"
      tolerance: "R/DESeq2 版本允许正则匹配，不要求精确版本"
    quantitative_concordance:
      weight: 35
      what_it_tests: "系统能否正确识别 Drug A 和 Drug B 的差异表达基因"
      tolerance: "padj 用上限，log2FC 方向必须一致"
    figure_and_finding:
      weight: 20
      what_it_tests: "系统能否产出 volcano plot 和 PCA 图"
      tolerance: "定性检查"

  scoring_rationale: >
    定量一致性权重最高（35%），因为药物响应基因是核心产出。
    流程质量（25%）反映环境适应能力。数据完整性（20%）和图表（20%）。

# ───────────────────────────────────────────
# 复杂度画像
# ───────────────────────────────────────────

complexity_profile:
  data:
    data_size: tiny
    data_source: synthetic
    data_format: csv
    supplementary: none
  environment:
    tool_count: 3-5
    tool_chain: single_language
    version_sensitivity: strict
    container: custom_dockerfile
  analysis:
    design: two_group
    method_complexity: standard
    compute: light
  figure:
    figure_count: 2-5
    figure_type: mixed
    figure_layout: moderate
    figure_rendering: standard
  evaluation:
    ground_truth: fully_known
    claim_type: directional
    tolerance: moderate
  paper:
    paper_type: constructed
    paper_format: markdown
    multi_version: none
    missing_info: scattered_params

# ───────────────────────────────────────────
# 鲁棒性画像
# ───────────────────────────────────────────

robustness_profile:
  resource_unavailability:
    database_down: false
    registry_down: false
    tool_not_found: false
    repo_gone: true
    doi_dead: true
    image_missing: true
  data_degradation:
    empty_data_dir: false
    truncated_file: false
    format_mismatch: false
    wrong_accession: false
  information_degradation:
    missing_supplementary: true
    version_gaps: true
    implicit_steps: false
    scattered_params: true
    conflicting_info: true
  environment_drift:
    version_mismatch: true
    os_mismatch: true
    arch_mismatch: true
    missing_system_dep: false

# ───────────────────────────────────────────
# 系统能力覆盖
# ───────────────────────────────────────────

capability_coverage:
  covers:
    - conflicting_information: "Methods 说 ~condition，代码片段写 ~treatment"
    - version_mismatch: "论文声明 R 4.1.0，DESeq2 1.34.0（旧版本）"
    - os_mismatch: "论文在 Linux 运行，系统可能是 macOS"
    - arch_mismatch: "论文使用 x86_64，系统可能是 ARM64"
    - scattered_params: "过滤阈值在 Figure 1 legend"
    - version_gaps: "ggplot2 版本未指定"
    - custom_dockerfile: "需要旧版本 Bioconductor 镜像"
  does_not_cover:
    - multi_language: "纯 R 流程"
    - large_data: "30 基因 × 12 样本"

design_decisions:
  - decision: "Methods 声明 ~condition 但代码片段写 ~treatment"
    intent: "测试系统能否检测并解决冲突信息——这是一个真实的论文常见问题"
  - decision: "声明 R 4.1.0 / DESeq2 1.34.0（Bioconductor 3.14）"
    intent: "测试系统能否处理旧版本依赖，是否需要构建自定义 Docker 镜像"
  - decision: "声明 Linux x86_64 平台"
    intent: "测试系统能否在 macOS ARM64 上正确处理平台差异"
  - decision: "过滤阈值分散在 Figure 1 legend"
    intent: "测试系统能否从非 Methods 章节提取参数"

reproducibility:
  known_limitations:
    - "R 4.1.0 / DESeq2 1.34.0 的 Docker 镜像可能不可用，需要回退到最新版本"
    - "conflicting_info 需要系统判断使用哪个公式"
  expected_runtime: "~10 min（含 Docker 镜像构建）"
  data_size: "~1 KB"
  tool_requirements:
    - "R (论文声明 4.1.0，实际可用 ≥ 4.3.0)"
    - "DESeq2 (论文声明 1.34.0，实际可用 ≥ 1.42.0)"
    - "ggplot2"
  container_image: "bioconductor/bioconductor_docker:RELEASE_3_14"

baseline:
  established: "2026-07-19"
  runs: 5
  verdict: PARTIAL
  verdict_distribution: {REPRODUCED: 1, PARTIAL: 4, BLOCKED: 0, FAILED: 0}
  match_rate: 0.2
  score_min: 73
  score_max: 86
  score_mean: 79.2
  score_median: 80.0
  score_breakdown:
    data_integrity: 25.0
    process_quality: 22.9
    quantitative_concordance: 16.7
    figure_and_finding: 15.2
  backend: deepseek-v4-pro
  platform: Linux x86_64 (Ubuntu 22.04, Docker 29.2.0)