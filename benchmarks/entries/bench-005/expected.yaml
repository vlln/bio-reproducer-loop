id: bench-005
version: "1.0.0"
expected_verdict: REPRODUCED
min_score: 75
runs_required: 5
verdict_match_threshold: 0.6

checks:
  data_integrity:
    - check_id: D1
      description: "Count matrix has 30 genes and 12 samples"
      type: auto
      expected:
        n_genes: 30
        n_samples: 12
    - check_id: D2
      description: "All expected output files generated"
      type: auto
      expected:
        files_non_empty: true
    - check_id: D3
      description: "Supplementary Table S2 is missing"
      type: auto
      expected:
        supplementary_missing: "Supplementary Table S2"
        handling: "detected_or_proceeded"

  process_quality:
    - check_id: Q1
      description: "DESeq2 differential expression analysis completed"
      type: auto
      expected:
        status: success
    - check_id: Q2
      description: "Conflicting design formula detected and resolved"
      type: auto
      expected:
        conflict_detected: true
    - check_id: Q3
      description: "Environment mismatch detected (R version, OS, arch)"
      type: auto
      expected:
        environment_mismatch_detected: true
    - check_id: Q4
      description: "R version is compatible (4.1.x or 4.3.x)"
      type: auto
      expected:
        r_version_pattern: "4\\.[13]"

  quantitative_concordance:
    - check_id: R1
      description: "ERBB2 is upregulated in DrugA vs DMSO"
      type: auto
      expected:
        gene: ERBB2
        direction: up
        log2fc_min: 1.0
        padj_max: 0.05
    - check_id: R2
      description: "MYC is upregulated in DrugA vs DMSO"
      type: auto
      expected:
        gene: MYC
        direction: up
        log2fc_min: 1.0
        padj_max: 0.05
    - check_id: R3
      description: "JUN is upregulated in DrugA vs DMSO"
      type: auto
      expected:
        gene: JUN
        direction: up
        log2fc_min: 1.0
        padj_max: 0.05
    - check_id: R4
      description: "BCL2 is downregulated in DrugA vs DMSO"
      type: auto
      expected:
        gene: BCL2
        direction: down
        log2fc_max: -1.0
        padj_max: 0.05
    - check_id: R5
      description: "MCL1 is downregulated in DrugA vs DMSO"
      type: auto
      expected:
        gene: MCL1
        direction: down
        log2fc_max: -1.0
        padj_max: 0.05
    - check_id: R6
      description: "At least 8 significant genes found (padj < 0.05)"
      type: auto
      expected:
        min_sig_genes: 8

  figure_and_finding:
    - check_id: F1
      description: "Volcano plot generated"
      type: auto
      expected:
        figure_exists: true
        figure_type: volcano
    - check_id: F2
      description: "Volcano plot shows highlighted significant genes"
      type: visual
      expected:
        highlighted_genes: ["ERBB2", "MYC", "JUN", "BCL2", "MCL1"]
    - check_id: F3
      description: "PCA plot shows treatment group separation"
      type: auto
      expected:
        figure_exists: true
        figure_type: pca