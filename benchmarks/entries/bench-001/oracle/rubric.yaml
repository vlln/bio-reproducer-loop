id: bench-001
benchmark_version: "2.0.0"
oracle_version: "1.0.0"
expected_verdict: REPRODUCED
verdict_match_threshold: 0.6
verdict_thresholds:
  reproduced: 85
  partial: 50

checks:
  - id: D1
    description: Differential expression result table is non-empty
    evidence:
      artifact_role: result_table
    comparison:
      comparator: file_nonempty
    weight: 10

  - id: D2
    description: Normalized count table contains 10 genes and 6 samples
    evidence:
      artifact_role: normalized_counts
    comparison:
      comparator: csv_shape
      rows: 10
      columns: 7
    weight: 10

  - id: Q1
    description: The recorded environment contains DESeq2
    evidence:
      artifact_role: environment
    comparison:
      comparator: text_regex
      pattern: "(?i)DESeq2[_ ]"
    weight: 10

  - id: R1
    description: Gene_A is upregulated
    evidence:
      artifact_role: result_table
    comparison:
      comparator: csv_row
      key_columns: [gene, Gene, ""]
      key_equals: Gene_A
      assertions:
        - column: log2FoldChange
          operator: greater_than
          value: 1.5
    weight: 15

  - id: R2
    description: Gene_A is significant
    evidence:
      artifact_role: result_table
    comparison:
      comparator: csv_row
      key_columns: [gene, Gene, ""]
      key_equals: Gene_A
      assertions:
        - column: padj
          operator: less_than
          value: 0.01
    weight: 10

  - id: R3
    description: Gene_B is downregulated
    evidence:
      artifact_role: result_table
    comparison:
      comparator: csv_row
      key_columns: [gene, Gene, ""]
      key_equals: Gene_B
      assertions:
        - column: log2FoldChange
          operator: less_than
          value: -1.0
    weight: 15

  - id: R4
    description: Gene_B is significant
    evidence:
      artifact_role: result_table
    comparison:
      comparator: csv_row
      key_columns: [gene, Gene, ""]
      key_equals: Gene_B
      assertions:
        - column: padj
          operator: less_than
          value: 0.01
    weight: 10

  - id: R5
    description: At least two genes have adjusted p-value below 0.05
    evidence:
      artifact_role: result_table
    comparison:
      comparator: csv_count
      where:
        - column: padj
          operator: less_than
          value: 0.05
      assertion:
        operator: greater_than_or_equal
        value: 2
    weight: 10

  - id: F1
    description: A non-empty volcano plot was generated
    evidence:
      artifact_role: figure
      artifact_id: volcano
    comparison:
      comparator: png_valid
    weight: 10
